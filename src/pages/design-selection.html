<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Selection - Portify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white text-slate-800 min-h-screen flex flex-col">

  <!-- STEPPER -->
  <header class="border-b border-slate-200 py-4">
    <div class="max-w-3xl mx-auto px-6 flex items-center justify-center">
      <div class="flex flex-col items-center">
        <div class="w-9 h-9 rounded-full bg-green-500 text-white flex items-center justify-center font-bold text-sm">✓</div>
        <span class="text-xs font-semibold text-green-500 mt-1">Upload CV</span>
      </div>
      <div class="h-0.5 w-32 bg-green-500 mb-4"></div>
      <div class="flex flex-col items-center">
        <div class="w-9 h-9 rounded-full bg-green-500 text-white flex items-center justify-center font-bold text-sm">✓</div>
        <span class="text-xs font-semibold text-green-500 mt-1">AI Analysis</span>
      </div>
      <div class="h-0.5 w-32 bg-blue-600 mb-4"></div>
      <div class="flex flex-col items-center">
        <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow">3</div>
        <span class="text-xs font-semibold text-blue-600 mt-1">Design Selection</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-4xl mx-auto w-full px-6 py-10">
    <span class="inline-block bg-blue-50 text-blue-600 text-xs font-medium px-3 py-1 rounded-full mb-3">Step 3 of 3</span>
    <h1 class="text-3xl font-bold text-slate-900 mb-2">Pick your style</h1>
    <p class="text-sm text-slate-500 mb-8 max-w-xs leading-relaxed">Choose a design theme for your portfolio. You can customize it later.</p>

    <!-- Theme Cards -->
    <div class="grid grid-cols-3 gap-5 mb-8">

      <!-- Minimal -->
      <div id="card-minimal" onclick="selectTheme('minimal')" class="border-2 border-slate-200 rounded-xl overflow-hidden cursor-pointer transition-all hover:border-blue-300">
        <div class="bg-slate-50 p-6 h-44 flex items-center justify-center">
          <div class="w-full bg-white rounded-lg p-4 shadow-sm">
            <div class="w-6 h-6 rounded-full bg-slate-300 mb-2"></div>
            <div class="h-2 bg-slate-200 rounded w-3/4 mb-1"></div>
            <div class="h-2 bg-slate-200 rounded w-1/2"></div>
          </div>
        </div>
        <div class="p-4">
          <p class="font-semibold text-slate-800 text-sm mb-0.5">Minimal</p>
          <p class="text-xs text-slate-400 mb-3">Clean & simple</p>
          <button id="btn-minimal" class="w-full border border-blue-600 text-blue-600 font-semibold text-sm py-2 rounded-lg">Selected</button>
        </div>
      </div>

      <!-- Dark Pro -->
      <div id="card-darkpro" onclick="selectTheme('darkpro')" class="border-2 border-slate-200 rounded-xl overflow-hidden cursor-pointer transition-all hover:border-blue-300">
        <div class="bg-slate-900 p-6 h-44 flex items-center justify-center">
          <div class="w-full bg-slate-800 rounded-lg p-4">
            <div class="w-6 h-6 rounded-full bg-slate-600 mb-2"></div>
            <div class="h-2 bg-slate-600 rounded w-3/4 mb-1"></div>
            <div class="h-2 bg-slate-600 rounded w-1/2"></div>
          </div>
        </div>
        <div class="p-4">
          <p class="font-semibold text-slate-800 text-sm mb-0.5">Dark Pro</p>
          <p class="text-xs text-slate-400 mb-3">Bold & modern</p>
          <button id="btn-darkpro" class="w-full bg-blue-600 text-white font-semibold text-sm py-2 rounded-lg hover:bg-blue-700 transition">Select</button>
        </div>
      </div>

      <!-- Warm -->
      <div id="card-warm" onclick="selectTheme('warm')" class="border-2 border-slate-200 rounded-xl overflow-hidden cursor-pointer transition-all hover:border-blue-300">
        <div class="bg-orange-50 p-6 h-44 flex items-center justify-center">
          <div class="w-full bg-white rounded-lg p-4 shadow-sm">
            <div class="w-6 h-6 rounded-full bg-orange-200 mb-2"></div>
            <div class="h-2 bg-orange-200 rounded w-3/4 mb-1"></div>
            <div class="h-2 bg-orange-100 rounded w-1/2"></div>
          </div>
        </div>
        <div class="p-4">
          <p class="font-semibold text-slate-800 text-sm mb-0.5">Warm</p>
          <p class="text-xs text-slate-400 mb-3">Friendly & soft</p>
          <button id="btn-warm" class="w-full bg-blue-600 text-white font-semibold text-sm py-2 rounded-lg hover:bg-blue-700 transition">Select</button>
        </div>
      </div>

    </div>

    <!-- Style Keywords -->
    <div>
      <p class="text-sm font-medium text-slate-700 mb-3">Style keywords <span class="text-slate-400 font-normal">(optional)</span></p>
      <div class="flex flex-wrap gap-2" id="keywords">
        <button onclick="toggleKeyword(this)" class="keyword-btn border border-blue-500 text-blue-600 bg-blue-50 text-sm px-4 py-1.5 rounded-full font-medium transition">Minimalist</button>
        <button onclick="toggleKeyword(this)" class="keyword-btn border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-full transition hover:border-blue-300">Professional</button>
        <button onclick="toggleKeyword(this)" class="keyword-btn border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-full transition hover:border-blue-300">Creative</button>
        <button onclick="toggleKeyword(this)" class="keyword-btn border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-full transition hover:border-blue-300">Bold</button>
        <button onclick="toggleKeyword(this)" class="keyword-btn border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-full transition hover:border-blue-300">Elegant</button>
        <button onclick="toggleKeyword(this)" class="keyword-btn border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-full transition hover:border-blue-300">Glassmorphism</button>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="border-t border-slate-200 px-6 py-4 flex items-center justify-between">
    <a href="ai-analysis.html" class="inline-flex items-center gap-2 border border-slate-200 text-slate-600 font-semibold text-sm px-5 py-2.5 rounded-lg hover:bg-slate-50 transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Previous
    </a>
    <a href="publish.html" class="inline-flex items-center gap-2 bg-blue-600 text-white font-semibold text-sm px-6 py-2.5 rounded-lg hover:bg-blue-700 transition">
      Generate Portfolio
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
      </svg>
    </a>
  </footer>

  <script>
    let selectedTheme = 'minimal';
    const themes = ['minimal','darkpro','warm'];

    function selectTheme(theme) {
      selectedTheme = theme;
      themes.forEach(t => {
        const card = document.getElementById('card-' + t);
        const btn = document.getElementById('btn-' + t);
        if (t === theme) {
          card.classList.add('border-blue-500');
          card.classList.remove('border-slate-200');
          btn.className = 'w-full border border-blue-600 text-blue-600 font-semibold text-sm py-2 rounded-lg';
          btn.textContent = 'Selected';
        } else {
          card.classList.remove('border-blue-500');
          card.classList.add('border-slate-200');
          btn.className = 'w-full bg-blue-600 text-white font-semibold text-sm py-2 rounded-lg hover:bg-blue-700 transition';
          btn.textContent = 'Select';
        }
      });
    }

    function toggleKeyword(btn) {
      const active = btn.classList.contains('border-blue-500');
      if (active) {
        btn.className = 'keyword-btn border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-full transition hover:border-blue-300';
      } else {
        btn.className = 'keyword-btn border border-blue-500 text-blue-600 bg-blue-50 text-sm px-4 py-1.5 rounded-full font-medium transition';
      }
    }
  </script>
</body>
</html>
