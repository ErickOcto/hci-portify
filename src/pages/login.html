<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Portify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white text-slate-800 min-h-screen flex">

  <!-- LEFT PANEL: Gradient intro -->
  <aside class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-blue-500 to-blue-700 flex-col justify-center px-16 relative">
    <button onclick="window.history.back()" class="absolute top-6 left-6 inline-flex items-center gap-1.5 bg-white/90 text-blue-700 text-sm font-semibold px-4 py-2 rounded-full hover:bg-white transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Back
    </button>
    <h1 class="text-4xl font-extrabold text-white mb-4">Welcome Back</h1>
    <p class="text-lg font-semibold text-blue-100">Login to continue your journey…</p>
  </aside>

  <!-- RIGHT PANEL: Form -->
  <main class="flex-1 flex flex-col justify-center px-8 sm:px-16 py-12">
    <div class="max-w-md w-full mx-auto">
      <h2 class="text-2xl font-bold text-blue-900 mb-1 text-center">Login to your account</h2>
      <p class="text-sm text-blue-400 mb-8 text-center">Enter your email below to login to your account</p>

      <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">

        <div>
          <label class="text-sm font-semibold text-blue-900 block mb-1.5">Email</label>
          <input id="login-email" type="email" class="w-full bg-blue-50/60 border border-blue-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition" />
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="text-sm font-semibold text-blue-900">Password</label>
            <a href="#" class="text-xs font-semibold text-blue-600 hover:underline">Forgot Your Password?</a>
          </div>
          <input id="login-password" type="password" class="w-full bg-blue-50/60 border border-blue-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-blue-500 transition" />
        </div>

        <!-- Error message -->
        <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-600 text-xs rounded-lg px-4 py-3"></div>

        <button type="submit" class="w-full bg-blue-900 text-white font-semibold py-3 rounded-xl hover:bg-blue-800 transition text-sm">Login</button>

        <div class="flex items-center gap-3 py-1">
          <div class="flex-1 h-px bg-slate-200"></div>
          <span class="text-xs text-slate-400">Or continue with</span>
          <div class="flex-1 h-px bg-slate-200"></div>
        </div>

        <button type="button" onclick="mockGitHubLogin()" class="w-full flex items-center justify-center gap-2 bg-blue-50/60 border border-blue-200 text-blue-900 font-semibold py-3 rounded-xl hover:bg-blue-50 transition text-sm">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55v-2.1c-3.2.7-3.87-1.36-3.87-1.36-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.03 1.77 2.71 1.26 3.37.96.1-.74.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 015.78 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.41-5.27 5.69.42.36.78 1.08.78 2.18v3.24c0 .3.21.66.79.55A11.5 11.5 0 0023.5 12C23.5 5.65 18.35.5 12 .5z" />
          </svg>
          Login with GitHub
        </button>
      </form>

      <p class="text-sm text-blue-700 text-center mt-6">Don't have an account? <a href="signup.html" class="underline font-semibold">Sign up</a></p>
    </div>
  </main>

  <script>
    function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showLoginError('Please enter both your email and password.');
        return;
      }

      hideLoginError();
      // Login successful (simulated) — go straight to the dashboard
      window.location.href = '../../index.html';
    }

    function showLoginError(msg) {
      const errorBox = document.getElementById('login-error');
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function hideLoginError() {
      document.getElementById('login-error').classList.add('hidden');
    }

    function mockGitHubLogin() {
      showLoginError('GitHub login is simulated in this demo — please use the form above instead.');
    }
  </script>
</body>
</html>
